# ===================================================================
# MIND Project - Pretraining Configuration with Equivariant Features
# ===================================================================
# This config enables pretraining with layer-wise equivariant integration
# using NequIP's InteractionBlock for E(3)-equivariant features.
#
# Key Features:
# - Layer-wise equivariant integration (EquivariantSAB in each attention layer)
# - Translation invariant (position centering)
# - Rotation equivariant (predictable transformation)
# - Multi-domain support (proteins, small molecules, etc.)
#
# Usage:
#   python core/train_pretrain.py --config-yaml-path core/pretraining_config_equivariant.yaml
# ===================================================================

# -------------------------
# Genel ve Çıktı Ayarları
# -------------------------
seed: 42
out_path: "outputs/pretrain_equivariant"
wandb_project_name: "MIND-Project-Pretraining-Equivariant"
wandb_run_name: "equivariant-pretrain-run-1"

# -------------------------
# Multi-Domain Configuration
# -------------------------
multi_domain:
  enabled: true  # ✅ Set to true to enable multi-domain training
  
  # Dataset Configurations
  datasets:
    pdb:
      enabled: true
      chunk_dir: "/home/yusuf/data/proteins/processed_14atom"  # 14-atom uniform representation chunks
      atom_ratio: 70  
      chunk_range: [0, 9]  # Use all 10 chunks
    
    qm9:
      enabled: true  # QM9 with legacy edges (cutoff 5.0Å, 16 neighbors)
      chunk_dir: "/home/arin/data/qm9_chunks"  # Will match qm9_chunks_chunk_0 through qm9_chunks_chunk_4
      atom_ratio: 30  
      chunk_range: null
    
    metabolite:
      enabled: false  # Not yet available
      chunk_dir: "../data/metabolites/processed_chunks"
      atom_ratio: 10
    
    rna:
      enabled: false  # Future expansion
      chunk_dir: "../data/rna/processed_chunks"
      atom_ratio: 5
    
    dna:
      enabled: false  # Future expansion
      chunk_dir: "../data/dna/processed_chunks"
      atom_ratio: 0
  
  # Rotational Sampling Parameters
  target_atoms_per_rotation: 50000
  max_cache_chunks: 10              # Maximum chunks in LRU cache (adjust based on system RAM)
  fallback_to_single_domain: true   # If metadata missing, fall back to ChunkAwareSampler

# -------------------------
# Single-Domain Fallback Settings
# (Used when multi_domain.enabled = false OR only one dataset type is enabled)
# -------------------------
dataset: PDB
universal_cache_path: "data_loading/cache/universal_pdb_all.pkl"
dataset_download_dir: "/home/yusuf/data/proteins/processed_14atom"  # 14-atom uniform chunks

# -------------------------
# Data Loading Settings
# -------------------------
num_workers: 0  # Required for dynamic batching with lazy datasets (avoids hanging)
max_samples: null  # null = use all available samples
use_universal_cache: true

# -------------------------
# Eğitim Parametreleri
# -------------------------
max_epochs: 120
batch_size: 32  # Used for validation/test (training uses dynamic batching)
use_dynamic_batching: true  # ⚡ Essential for mixed datasets - enables atom-aware batching
use_improved_sampler: true  # ✅ Use improved sampler (requires metadata, much faster)
max_atoms_per_batch: 6000  # Reduced for DENSE path memory efficiency in multi-domain training
log_batch_statistics: true  # Print batch composition statistics during training
batch_stats_log_frequency: 10  # Log every N batches

# Per-Type Loss Tracking (for multi-domain analysis)
compute_per_type_losses: true   # ✅ Track losses per dataset type (protein, qm9, etc.)
log_per_type_frequency: 10      # Log per-type losses every N batches (reduce overhead)  

lr: 0.0005
early_stopping_patience: 15
gradient_clip_val: 0.5
optimiser_weight_decay: 1.0e-10
monitor_loss_name: "val_total_loss"
use_bfloat16: true  # Required for flash_varlen
accelerator: gpu
devices: 1  # Use single GPU
precision: bfloat16  # Required for flash_varlen
num_sanity_val_steps: 0 
val_check_interval: 1.0  # Run validation at end of each epoch
fast_dev_run: false

# -------------------------
# Model Mimarisi (ESA)
# -------------------------
apply_attention_on: node
graph_dim: 256
edge_dim: 64
hidden_dims: [256, 256, 256, 256, 256, 256, 256, 256]
num_heads: [16, 16, 16, 16, 16, 16, 16, 16]
layer_types: ["M", "S", "M", "S", "M", "S", "P", "P"]
xformers_or_torch_attn: flash_varlen  # ⚡ Padding-free for mixed sizes
norm_type: LN
use_3d_coordinates: true
set_max_items: 0
triu_attn_mask: false

# -------------------------
# MLP Ayarları
# -------------------------
use_mlps: true
mlp_hidden_size: 512
num_mlp_layers: 3
mlp_type: standard
mlp_dropout: 0.0
use_mlp_ln: false
pre_or_post: pre

# -------------------------
# Dropout Ayarları
# -------------------------
sab_dropout: 0.0
mab_dropout: 0.0
pma_dropout: 0.0
attn_residual_dropout: 0.0
pma_residual_dropout: 0.0

# -------------------------
# 3D Geometrik Parametreler
# -------------------------
molecule_max_atoms: null
gaussian_kernels: 128
cutoff_distance: 5.0  # Graph representation max distance is n angstrom
max_neighbors: 64  # Max neighbors for protein is 64
max_distance: 20.0  # Used in training
distance_bins: 5

# -------------------------
# Distance-Based Attention Bias (Optional)
# -------------------------
# Enables 3D distance-based attention bias: far atoms get less attention
use_distance_bias: false  # Set to true to enable distance-based attention bias
distance_bias_scale: 1.0  # Scaling factor for distance bias (higher = stronger distance penalty)
distance_bias_cutoff: 10.0  # Distances beyond this are clamped (Angstroms)

# -------------------------
# Hybrid Edge Construction (Salad-inspired)
# -------------------------
# Enables 3-tier hybrid edge construction:
# Tier 1: Sequence-based edges (backbone connectivity)
# Tier 2: Spatial edges (filtered to exclude Tier 1)
# Tier 3: Random long-range edges
use_hybrid_edges: true
sequence_neighbors_k: 3          # Tier 1: Connect residue i to i±k neighbors in sequence
max_spatial_neighbors: 48        # Tier 2: Spatial neighbors (reduced from 64, some covered by Tier 1)
num_random_edges: 8              # Tier 3: Random long-range edges (scaled for proteins <1024 AA)
random_edge_min_distance: 10.0   # Tier 3: Minimum distance (Å) for random edges

# -------------------------
# Equivariant Features (Layer-wise Integration)
# -------------------------
# Enables E(3)-equivariant features using NequIP's InteractionBlock
# Integrated layer-wise in each SAB (Self-Attention Block) via EquivariantSAB
use_equivariant_features: true  # ✅ Set to true to enable equivariant branch (layer-wise integration)
equivariant_lmax: 2  # Maximum angular momentum (l=0,1,2) - controls spherical harmonics order
equivariant_num_features: 16  # Number of tensor feature channels (scalars + vectors)
equivariant_fusion_method: add  # Fusion method: add, concat, bilinear, or gated
equivariant_cross_connection: true  # Enable cross-connection between invariant and equivariant branches

# -------------------------
# Ön-Eğitim Görevleri
# -------------------------
pretraining_tasks: ["long_range_distance", "short_range_distance", "mlm"]
task_weights:
  long_range_distance: 1.5
  short_range_distance: 1.0
  mlm: 0.3
mlm_mask_ratio: 0.15  # Ratio of atoms to mask for MLM task
metabolite_masking_strategy: legacy_random  # Set brics_fragment for BRICS-based metabolite masking
metabolite_brics_source: precomputed
metabolite_mask_target_ratio: 0.15
metabolite_max_mask_ratio_per_graph: 0.5
metabolite_allow_partial_fragment_masking: false
temperature: 0.2

# -------------------------
# Yeni Kod Yapısı İçin Gerekli Diğer Parametreler
# -------------------------
max_block_types: 150
max_position_types: 15
max_entity_types: 6
block_embedding_dim: 32
position_embedding_dim: 16
entity_embedding_dim: 8
use_hierarchical_features: false
max_atomic_num: 118
rwse_dim: 24
lap_dim: 4
mlp_inter_dim: 128
pma_num_outputs: 32

# ===================================================================
# Quick Start Guide
# ===================================================================
#
# 1. EQUIVARIANT PRETRAINING:
#    - Equivariant features are enabled by default (use_equivariant_features: true)
#    - Layer-wise integration: EquivariantSAB in each SAB layer
#    - Translation invariant: Position centering applied automatically
#    - Rotation equivariant: Predictable transformation under rotation
#
# 2. RUN TRAINING:
#    python core/train_pretrain.py --config-yaml-path core/pretraining_config_equivariant.yaml
#
# 3. MONITORING:
#    - Check WandB dashboard for training progress
#    - Equivariant features will be logged in model architecture
#    - Translation/rotation invariance verified in tests
#
# 4. TUNING PARAMETERS:
#    - equivariant_lmax: Increase for higher angular resolution (2 = l=0,1,2)
#    - equivariant_num_features: Increase for more tensor channels (16 = 8 scalars + 8 vectors)
#    - equivariant_fusion_method: Try "concat" or "bilinear" for different fusion strategies
#    - equivariant_cross_connection: Set to false to disable cross-connections
#
# ===================================================================
